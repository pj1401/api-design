name: tracks-api
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tracks-api-postgres
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d tracks-api-postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  seed:
    build:
      context: .
      dockerfile: seed/Dockerfile
    environment:
      POSTGRES_DB: tracks-api-postgres
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./seed/data:/app/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      POSTGRES_DB: tracks-api-postgres
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
